<!DOCTYPE html>
<html>
<head>
  <title>Planner</title>
</head>
<body>

<h1>Task Planner</h1>

<input id="task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<script>
function addTask(){
  let task = document.getElementById("task").value;

  if(task === ""){
    alert("Task cannot be empty");
    return;
  }

  let li = document.createElement("li");
  li.innerText = task;

  li.onclick = function(){
    li.remove();
  };

  document.getElementById("list").appendChild(li);
}
</script>

</body>
</html>
